name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-java:
    name: Build & Test Java Services
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jumarkot
          POSTGRES_PASSWORD: jumarkot_dev_secret
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --parallel -x test

      - name: Test
        run: ./gradlew test --parallel
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: jumarkot
          SPRING_DATASOURCE_PASSWORD: jumarkot_dev_secret
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
          JWT_SECRET: ci_test_jwt_secret_replace_in_production_min_64_chars_long

  build-frontend:
    name: Build Frontend Apps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/ops-console/package-lock.json
            apps/developer-portal/package-lock.json

      - name: Install & build ops-console
        working-directory: apps/ops-console
        run: npm ci && npm run build

      - name: Install & build developer-portal
        working-directory: apps/developer-portal
        run: npm ci && npm run build
