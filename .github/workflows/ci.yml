name: CI

on:
  push:
    branches: [main, develop, stage-1, stage-2, stage-3, stage-4]
  pull_request:
    branches: [main, develop, stage-2, stage-3, stage-4]

jobs:
  build-java:
    name: Build & Test Java Services
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jumarkot
          POSTGRES_PASSWORD: jumarkot_dev_secret
          POSTGRES_DB: jumarkot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      # Unauthenticated — apps override REDIS_PASSWORD to "" so Spring sends no AUTH
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Create per-service databases
        run: |
          PGPASSWORD=jumarkot_dev_secret psql -h localhost -U jumarkot -d jumarkot_ci \
            -c "CREATE DATABASE decision_db;" \
            -c "CREATE DATABASE rules_db;" \
            -c "CREATE DATABASE tenant_db;" \
            -c "CREATE DATABASE identity_db;" \
            -c "CREATE DATABASE ingestion_db;" \
            -c "CREATE DATABASE entity_db;"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Compile all modules
        run: ./gradlew build --parallel -x test

      - name: Run backend tests
        run: |
          ./gradlew \
            :packages:shared-auth:test \
            :services:decision-engine-service:test \
            :services:rules-service:test \
            :services:tenant-service:test \
            :services:identity-access-service:test \
            :services:event-ingestion-service:test \
            :services:entity-profile-service:test \
            --parallel
        env:
          # ── Databases ─────────────────────────────────────────────────────
          DECISION_DB_URL: jdbc:postgresql://localhost:5432/decision_db
          RULES_DB_URL: jdbc:postgresql://localhost:5432/rules_db
          TENANT_DB_URL: jdbc:postgresql://localhost:5432/tenant_db
          IDENTITY_DB_URL: jdbc:postgresql://localhost:5432/identity_db
          INGESTION_DB_URL: jdbc:postgresql://localhost:5432/ingestion_db
          ENTITY_DB_URL: jdbc:postgresql://localhost:5432/entity_db
          DB_USERNAME: jumarkot
          DB_PASSWORD: jumarkot_dev_secret
          POSTGRES_USER: jumarkot
          POSTGRES_PASSWORD: jumarkot_dev_secret
          # ── Redis (no-auth in CI; empty string → Spring sends no AUTH) ────
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          # ── Kafka (not in CI; Spring Kafka connects lazily — OK) ──────────
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          EVENT_INGESTION_TOPIC: events.ingested
          # ── Service-to-service credentials (decision-engine → rules-service) ──
          RULES_SERVICE_URL: http://localhost:8087
          RULES_SERVICE_USER: admin
          RULES_SERVICE_PASSWORD: changeme
          # ── Per-service Basic auth credentials (must match spring.security.user) ─
          TENANT_SERVICE_USER: admin
          TENANT_SERVICE_PASSWORD: changeme
          IDENTITY_SERVICE_USER: admin
          IDENTITY_SERVICE_PASSWORD: changeme

  build-frontend:
    name: Build Frontend Apps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/ops-console/package-lock.json
            apps/developer-portal/package-lock.json

      - name: Install ops-console dependencies
        working-directory: apps/ops-console
        run: npm ci

      - name: Run ops-console CI gate (coverage + typecheck + build)
        working-directory: apps/ops-console
        run: npm run test:ci

      - name: Install & build developer-portal
        working-directory: apps/developer-portal
        run: npm ci && npm run build
