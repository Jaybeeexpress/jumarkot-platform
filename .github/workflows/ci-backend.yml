name: CI — Backend Services

on:
  push:
    branches: [main, "copilot/**"]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'packages/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-access-service
          - tenant-service
          - event-ingestion-service
          - decision-engine-service
          - rules-service
          - alert-case-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jumarkot
          POSTGRES_PASSWORD: jumarkot
          POSTGRES_DB: jumarkot
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper execute permission
        run: chmod +x ./gradlew

      - name: Build packages
        run: ./gradlew :packages:api-contracts:build :packages:event-schemas:build --no-daemon

      - name: Build and test service
        run: >
          ./gradlew
          :services:${{ matrix.service }}:build
          --no-daemon
          -x integrationTest
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/jumarkot
          SPRING_DATASOURCE_USERNAME: jumarkot
          SPRING_DATASOURCE_PASSWORD: jumarkot
          JWT_SECRET: test-secret-that-is-at-least-256-bits-long-for-testing-only

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/tests/
          retention-days: 7
