{{- if .Values.decisionEngineService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-engine-service
  labels:
    {{- include "jumarkot.labels" . | nindent 4 }}
    app.kubernetes.io/component: decision-engine-service
spec:
  replicas: {{ .Values.decisionEngineService.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: decision-engine-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: decision-engine-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: decision-engine-service
          image: "{{ .Values.decisionEngineService.image.repository }}:{{ .Values.decisionEngineService.image.tag }}"
          imagePullPolicy: {{ .Values.decisionEngineService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.decisionEngineService.service.port }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: jumarkot-secrets
                  key: database-url
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: jumarkot-secrets
                  key: kafka-bootstrap-servers
          resources:
            {{- toYaml .Values.decisionEngineService.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.decisionEngineService.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.decisionEngineService.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: decision-engine-service
  labels:
    {{- include "jumarkot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.decisionEngineService.service.type }}
  ports:
    - port: {{ .Values.decisionEngineService.service.port }}
      targetPort: {{ .Values.decisionEngineService.service.port }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: decision-engine-service
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
