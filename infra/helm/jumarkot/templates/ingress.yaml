{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jumarkot-ingress
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /v1/auth
            pathType: Prefix
            backend:
              service:
                name: identity-access-service
                port:
                  number: {{ .Values.identityAccessService.service.port }}
          - path: /v1/tenants
            pathType: Prefix
            backend:
              service:
                name: tenant-service
                port:
                  number: {{ .Values.tenantService.service.port }}
          - path: /v1/events
            pathType: Prefix
            backend:
              service:
                name: event-ingestion-service
                port:
                  number: {{ .Values.eventIngestionService.service.port }}
          - path: /v1/decisions
            pathType: Prefix
            backend:
              service:
                name: decision-engine-service
                port:
                  number: {{ .Values.decisionEngineService.service.port }}
          - path: /v1/rules
            pathType: Prefix
            backend:
              service:
                name: rules-service
                port:
                  number: {{ .Values.rulesService.service.port }}
{{- end }}
