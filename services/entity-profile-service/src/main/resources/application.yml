spring:
  application:
    name: entity-profile-service
  datasource:
    url: ${ENTITY_DB_URL:jdbc:postgresql://localhost:5432/entity_db}
    username: ${DB_USERNAME:${POSTGRES_USER:jumarkot}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:jumarkot_dev_secret}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${ENTITY_PROFILE_CONSUMER_GROUP:entity-profile-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
server:
  port: ${ENTITY_SERVICE_PORT:${PORT:8088}}
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.jumarkot: DEBUG

jumarkot:
  entity-profile:
    events-topic: ${EVENT_INGESTION_TOPIC:events.ingested}
