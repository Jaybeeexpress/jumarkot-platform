spring:
  application:
    name: rules-service

  datasource:
    url: ${RULES_DB_URL:jdbc:postgresql://localhost:5432/rules_db}
    username: ${POSTGRES_USER:jumarkot}
    password: ${POSTGRES_PASSWORD:jumarkot_dev_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${RULES_SERVICE_PORT:8087}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.jumarkot: DEBUG
