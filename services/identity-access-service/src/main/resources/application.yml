spring:
  application:
    name: identity-access-service

  datasource:
    url: ${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${POSTGRES_USER:jumarkot}
    password: ${POSTGRES_PASSWORD:jumarkot_dev_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:jumarkot_redis_secret}
      timeout: 2000ms

  security:
    user:
      name: ${IDENTITY_SERVICE_USER:admin}
      password: ${IDENTITY_SERVICE_PASSWORD:changeme}

server:
  port: ${IDENTITY_SERVICE_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.jumarkot: DEBUG
