spring:
  application:
    name: decision-engine-service

  # Decision engine uses API-key auth via shared-auth filter chain.
  # Exclude default user-details auto config to avoid generated password behavior.
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${DECISION_DB_URL:jdbc:postgresql://localhost:5432/decision_db}
    username: ${DB_USERNAME:${POSTGRES_USER:jumarkot}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:jumarkot_dev_secret}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:jumarkot_redis_secret}
      timeout: 2000
      lettuce:
        pool:
          max-active: 16
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3

server:
  port: ${DECISION_SERVICE_PORT:${PORT:8085}}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

jumarkot:
  rules-service:
    base-url: ${RULES_SERVICE_URL:${RULES_SERVICE_BASE_URL:http://localhost:8087}}
    username: ${RULES_SERVICE_USER:admin}
    password: ${RULES_SERVICE_PASSWORD:changeme}
  rules-cache:
    ttl-seconds: 60
