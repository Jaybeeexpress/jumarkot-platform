# Production profile — all sensitive values MUST be supplied via environment variables.
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Spring Boot will refuse to start if any required variable is absent.

spring:
  datasource:
    url: ${DECISION_DB_URL}
    username: ${DB_USERNAME:${POSTGRES_USER}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD}}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

jumarkot:
  rules-service:
    base-url: ${RULES_SERVICE_URL:${RULES_SERVICE_BASE_URL}}
    username: ${RULES_SERVICE_USER}
    password: ${RULES_SERVICE_PASSWORD}
    connect-timeout: ${RULES_SERVICE_CONNECT_TIMEOUT}
    read-timeout: ${RULES_SERVICE_READ_TIMEOUT}
    block-timeout: ${RULES_SERVICE_BLOCK_TIMEOUT}

logging:
  level:
    com.jumarkot: INFO
    root: WARN
