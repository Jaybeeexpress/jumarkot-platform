# Production profile — all sensitive values MUST be supplied via environment variables.
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Spring Boot will refuse to start if any required variable is absent.

spring:
  datasource:
    url: ${DECISION_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

jumarkot:
  rules-service:
    base-url: ${RULES_SERVICE_URL}
    username: ${RULES_SERVICE_USER}
    password: ${RULES_SERVICE_PASSWORD}

logging:
  level:
    com.jumarkot: INFO
    root: WARN
