spring:
  application:
    name: tenant-service
  datasource:
    url: jdbc:postgresql://localhost:5432/jumarkot
    username: jumarkot
    password: jumarkot
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

jumarkot:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits}
