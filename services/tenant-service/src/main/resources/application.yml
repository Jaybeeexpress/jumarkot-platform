spring:
  application:
    name: tenant-service

  datasource:
    url: ${TENANT_DB_URL:jdbc:postgresql://localhost:5432/tenant_db}
    username: ${POSTGRES_USER:jumarkot}
    password: ${POSTGRES_PASSWORD:jumarkot_dev_secret}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Password must match the Docker Compose redis requirepass value
      password: ${REDIS_PASSWORD:jumarkot_redis_secret}
      timeout: 2000
      lettuce:
        pool:
          max-active: 8
          min-idle: 1

  # HTTP Basic credentials for admin/operator access (override via env vars in production)
  security:
    user:
      name: ${TENANT_SERVICE_USER:admin}
      password: ${TENANT_SERVICE_PASSWORD:changeme}

server:
  port: ${TENANT_SERVICE_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.jumarkot: DEBUG
