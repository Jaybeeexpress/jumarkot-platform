# Production profile — all sensitive values MUST be supplied via environment variables.
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Spring Boot will refuse to start if any required variable is absent.

spring:
  datasource:
    url: ${TENANT_DB_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

  security:
    user:
      name: ${TENANT_SERVICE_USER}
      password: ${TENANT_SERVICE_PASSWORD}

logging:
  level:
    com.jumarkot: INFO
    root: WARN
