spring:
  application:
    name: event-ingestion-service

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${INGESTION_DB_URL:jdbc:postgresql://localhost:5432/ingestion_db}
    username: ${DB_USERNAME:${POSTGRES_USER:jumarkot}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:jumarkot_dev_secret}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: 1
      retries: 3
server:
  port: ${INGESTION_SERVICE_PORT:${PORT:8084}}
  shutdown: graceful
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.jumarkot: DEBUG

jumarkot:
  ingestion:
    events-topic: ${EVENT_INGESTION_TOPIC:events.ingested}
